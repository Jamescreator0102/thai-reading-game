<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เกมภาษาไทยของครูเจมส์</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800&display=swap');

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Kanit', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background:
    radial-gradient(circle at top left, #ffe66d, transparent 30%),
    radial-gradient(circle at bottom right, #ff6bcb, transparent 35%),
    linear-gradient(135deg, #4facfe, #00f2fe);
  overflow: hidden;
}

.card {
  width: 90%;
  max-width: 430px;
  padding: 32px 26px;
  border-radius: 32px;
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(16px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.25);
  text-align: center;
  animation: pop 0.7s ease;
}

@keyframes pop {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.badge {
  display: inline-block;
  background: linear-gradient(135deg, #ff9a3c, #ff4ecd);
  color: white;
  padding: 8px 18px;
  border-radius: 999px;
  font-weight: 700;
  margin-bottom: 14px;
  box-shadow: 0 6px 15px rgba(255,78,205,0.35);
}

h1 {
  margin: 8px 0;
  font-size: 32px;
  color: #263238;
  text-shadow: 2px 2px 0 #fff176;
}

.subtitle {
  color: #546e7a;
  margin-bottom: 24px;
  font-size: 16px;
}

.input-group {
  text-align: left;
  margin-bottom: 16px;
}

label {
  font-weight: 700;
  color: #37474f;
  display: block;
  margin-bottom: 6px;
}

input, select {
  width: 100%;
  padding: 14px 16px;
  border: 3px solid #b2ebf2;
  border-radius: 18px;
  font-size: 16px;
  font-family: 'Kanit', sans-serif;
  outline: none;
  background: white;
}

input:focus, select:focus {
  border-color: #ffca28;
  box-shadow: 0 0 0 4px rgba(255,202,40,0.25);
}

button {
  width: 100%;
  margin-top: 14px;
  padding: 16px;
  border: none;
  border-radius: 22px;
  font-size: 20px;
  font-weight: 800;
  font-family: 'Kanit', sans-serif;
  color: white;
  cursor: pointer;
  background: linear-gradient(135deg, #00c853, #00b0ff);
  box-shadow: 0 10px 0 #00897b, 0 18px 30px rgba(0,0,0,0.25);
  transition: 0.15s;
}

button:active {
  transform: translateY(6px);
  box-shadow: 0 4px 0 #00897b;
}

.footer {
  margin-top: 22px;
  font-size: 14px;
  font-weight: 700;
  color: #455a64;
}

.cloud {
  position: absolute;
  font-size: 70px;
  opacity: 0.35;
  animation: float 5s infinite ease-in-out;
}

.c1 { top: 8%; left: 8%; }
.c2 { bottom: 10%; right: 8%; animation-delay: 1s; }
.c3 { top: 14%; right: 12%; animation-delay: 2s; }

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-18px); }
}
</style>
</head>

<body>

<div class="cloud c1">📚</div>
<div class="cloud c2">⭐</div>
<div class="cloud c3">🎮</div>

<div class="card">
  <div class="badge">เกมการเรียนรู้</div>
  <h1>เกมภาษาไทย</h1>
  <p class="subtitle">ผจญภัยไปกับการอ่านและตอบคำถาม</p>

  <div class="input-group">
    <label>ชื่อ - สกุล</label>
    <input type="text" id="studentName" placeholder="กรอกชื่อของนักเรียน">
  </div>

  <div class="input-group">
    <label>ระดับชั้น</label>
    <select id="studentClass">
      <option value="">เลือกระดับชั้น</option>
      <option>ป.4</option>
      <option>ป.5</option>
      <option>ป.6</option>
    </select>
  </div>

  <button onclick="startGame()">เริ่มภารกิจ 🚀</button>

  <div class="footer">สร้างโดย ครูเจมส์</div>
</div>

<script>
function startGame() {
  const name = document.getElementById("studentName").value.trim();
  const room = document.getElementById("studentClass").value;

  if (!name || !room) {
    alert("กรุณากรอกชื่อและเลือกระดับชั้นก่อนครับ");
    return;
  }

  alert("ยินดีต้อนรับ " + name + " ชั้น " + room + " เข้าสู่เกมภาษาไทย!");
}
</script>

</body>
</html>
