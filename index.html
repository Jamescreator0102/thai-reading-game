<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ภารกิจพิชิตใจความ</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800&display=swap');

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: 'Kanit', sans-serif;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  background-image: url('loading-bg.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.10);
  backdrop-filter: blur(2px);
  z-index: 0;
}

.loading-card {
  position: relative;
  z-index: 2;
  width: 90%;
  max-width: 520px;
  padding: 40px 32px;
  border-radius: 38px;
  text-align: center;
  background: rgba(255,255,255,0.78);
  border: 5px solid rgba(255,255,255,0.9);
  box-shadow: 0 28px 65px rgba(0,0,0,0.22);
  animation: popIn 0.7s ease;
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.9) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.book {
  font-size: 74px;
  animation: bounce 1.3s infinite ease-in-out;
}

@keyframes bounce {
  0%,100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-12px) rotate(3deg); }
}

.badge {
  display: inline-block;
  margin-top: 16px;
  padding: 10px 24px;
  border-radius: 999px;
  color: white;
  font-size: 20px;
  font-weight: 800;
  background: linear-gradient(135deg, #ff8a3d, #f64ecb);
  box-shadow: 0 10px 24px rgba(246,78,203,0.35);
}

h1{
  font-size:62px;
  font-weight:800;
  color:#ffe066;

  text-shadow:
    -3px -3px 0 #1b2a41,
     3px -3px 0 #1b2a41,
    -3px  3px 0 #1b2a41,
     3px  3px 0 #1b2a41,
     0 8px 15px rgba(0,0,0,.35);
}

.subtitle {
  margin-bottom: 28px;
  font-size: 24px;
  font-weight: 700;
  color: #546e7a;
}

.progress-box{
  width:100%;
  height:32px;
  border-radius:999px;
  overflow:hidden;

  background:rgba(255,255,255,.65);

  border:3px solid rgba(255,255,255,.9);

  box-shadow:
  inset 0 2px 8px rgba(0,0,0,.15),
  0 4px 12px rgba(0,0,0,.12);
}

.progress-box{
  width:100%;
  height:32px;
  border-radius:999px;
  overflow:hidden;

  background:rgba(255,255,255,.65);

  border:3px solid rgba(255,255,255,.9);

  box-shadow:
  inset 0 2px 8px rgba(0,0,0,.15),
  0 4px 12px rgba(0,0,0,.12);
}

.percent {
  margin-top: 18px;
  font-size: 34px;
  font-weight: 800;
  color: #ff6f00;
}

.loading-text {
  margin-top: 6px;
  font-size: 18px;
  font-weight: 700;
  color: #607d8b;
}

.footer {
  position: fixed;
  bottom: 22px;
  z-index: 2;
  width: 100%;
  text-align: center;
  font-size: 18px;
  font-weight: 800;
  color: rgba(38,50,56,0.72);
}
</style>
</head>

<body>

<div class="loading-card">
  <div class="book">📖</div>
  <div class="badge">เกมการเรียนรู้</div>
  <h1>ภารกิจพิชิตใจความ</h1>
  <div class="subtitle">เตรียมเข้าสู่โลกแห่งการอ่านแสนสนุก</div>

  <div class="progress-box">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="percent" id="percent">0%</div>
  <div class="loading-text" id="loadingText">กำลังโหลดความสนุก...</div>
</div>

<div class="footer">ผู้พัฒนา นายวิชญกร สัตตะโส ครูโรงเรียนเพียปู่หนองเรือ สพป.อด.๓</div>

<script>
let percent = 0;
const percentText = document.getElementById("percent");
const progressBar = document.getElementById("progressBar");
const loadingText = document.getElementById("loadingText");

const loading = setInterval(() => {
  percent++;
  percentText.textContent = percent + "%";
  progressBar.style.width = percent + "%";

  if (percent >= 100) {
    clearInterval(loading);
    percentText.textContent = "พร้อมแล้ว!";
    loadingText.textContent = "กำลังเข้าสู่หน้าเกม...";
  }
}, 40);
</script>

</body>
</html>
