<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thai Reading Game</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800&display=swap');

* { box-sizing: border-box; }

body body {
  margin: 0;
  min-height: 100vh;
  font-family: 'Kanit', sans-serif;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;

  background-image: url('images/loading-bg.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  filter: blur(5px);
  transform: scale(1.05);

  z-index: -2;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;

  background: rgba(0,0,0,0.15);

  z-index: -1;
}

.sun {
  position: absolute;
  top: 55px;
  right: 70px;
  width: 110px;
  height: 110px;
  border-radius: 50%;
  background: #ffd84d;
  box-shadow: 0 0 35px rgba(255,216,77,0.8);
  animation: sunBounce 3s infinite ease-in-out;
}

.sun::before {
  content: "😊";
  position: absolute;
  font-size: 46px;
  left: 25px;
  top: 25px;
}

@keyframes sunBounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-14px); }
}

.cloud {
  position: absolute;
  width: 150px;
  height: 55px;
  background: white;
  border-radius: 50px;
  opacity: 0.9;
  animation: cloudMove 9s infinite ease-in-out;
}

.cloud::before,
.cloud::after {
  content: "";
  position: absolute;
  background: white;
  border-radius: 50%;
}

.cloud::before {
  width: 70px;
  height: 70px;
  left: 25px;
  top: -35px;
}

.cloud::after {
  width: 85px;
  height: 85px;
  right: 18px;
  top: -45px;
}

.c1 { top: 95px; left: 55px; }
.c2 { top: 210px; right: 45px; transform: scale(0.75); animation-delay: 1s; }
.c3 { bottom: 120px; left: 35px; transform: scale(0.65); animation-delay: 2s; }

@keyframes cloudMove {
  0%,100% { margin-left: 0; }
  50% { margin-left: 28px; }
}

.star {
  position: absolute;
  font-size: 30px;
  animation: twinkle 1.6s infinite alternate;
}

.s1 { top: 20%; left: 20%; }
.s2 { top: 35%; right: 18%; animation-delay: .4s; }
.s3 { bottom: 24%; right: 26%; animation-delay: .8s; }

@keyframes twinkle {
  from { opacity: .25; transform: scale(.8); }
  to { opacity: 1; transform: scale(1.2); }
}

.card {
  position: relative;
  z-index: 5;
  width: 90%;
  max-width: 460px;
  padding: 34px 26px;
  border-radius: 36px;
  text-align: center;
  background: rgba(255,255,255,.88);
  backdrop-filter: blur(14px);
  box-shadow: 0 22px 45px rgba(0,0,0,.18);
  border: 5px solid rgba(255,255,255,.7);
  animation: cardPop .7s ease;
}

@keyframes cardPop {
  from { opacity: 0; transform: scale(.9) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.book {
  font-size: 78px;
  animation: bookBounce 1.2s infinite ease-in-out;
}

@keyframes bookBounce {
  0%,100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-12px) rotate(3deg); }
}

.badge {
  display: inline-block;
  margin-top: 8px;
  padding: 8px 18px;
  border-radius: 999px;
  background: linear-gradient(135deg, #ff9a3c, #ff4ecb);
  color: white;
  font-weight: 800;
  box-shadow: 0 8px 18px rgba(255,78,203,.35);
}

h1 {
  margin: 14px 0 4px;
  font-size: 34px;
  color: #263238;
  text-shadow: 2px 3px 0 #fff176;
}

p {
  margin: 0 0 22px;
  color: #546e7a;
  font-size: 17px;
  font-weight: 600;
}

.progress-box {
  width: 100%;
  height: 28px;
  border-radius: 999px;
  background: #e3f2fd;
  overflow: hidden;
  border: 4px solid white;
  box-shadow: inset 0 3px 8px rgba(0,0,0,.12);
}

.progress-bar {
  height: 100%;
  width: 0%;
  border-radius: 999px;
  background: linear-gradient(90deg, #ff5f6d, #ffc371, #47e891, #45caff);
  animation: load 4s forwards ease-in-out;
}

@keyframes load {
  from { width: 0%; }
  to { width: 100%; }
}

.percent {
  margin-top: 14px;
  font-size: 24px;
  font-weight: 800;
  color: #ff6f00;
}

.loading-text {
  margin-top: 6px;
  font-size: 15px;
  color: #607d8b;
  font-weight: 700;
}

.footer {
  position: absolute;
  bottom: 18px;
  width: 100%;
  text-align: center;
  font-weight: 800;
  color: rgba(38,50,56,.65);
}
</style>
</head>

<body>

<div class="sun"></div>

<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div class="cloud c3"></div>

<div class="star s1">⭐</div>
<div class="star s2">✨</div>
<div class="star s3">🌟</div>

<div class="card">
  <div class="book">📖</div>
  <div class="badge">เกมการเรียนรู้</div>
  <h1>เกมภาษาไทย</h1>
  <p>เตรียมเข้าสู่โลกแห่งการอ่านแสนสนุก</p>

  <div class="progress-box">
    <div class="progress-bar"></div>
  </div>

  <div class="percent" id="percent">0%</div>
  <div class="loading-text">กำลังโหลดความสนุก...</div>
</div>

<div class="footer">สร้างโดย ครูเจมส์</div>

<script>
let percent = 0;
const percentText = document.getElementById("percent");

const loading = setInterval(() => {
  percent++;
  percentText.textContent = percent + "%";

  if (percent >= 100) {
    clearInterval(loading);
    setTimeout(() => {
      percentText.textContent = "พร้อมแล้ว!";
    }, 300);
  }
}, 40);
</script>

</body>
</html>
