<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เกมภาษาไทยของครูเจมส์</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800&display=swap');

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: 'Kanit', sans-serif;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;

  background-image: url('loading-bg.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.10);
  backdrop-filter: blur(2px);
  z-index: 0;
}

.loading-card {
  position: relative;
  z-index: 2;
  width: 90%;
  max-width: 540px;
  padding: 42px 32px;
  border-radius: 40px;
  text-align: center;

  background: rgba(255,255,255,0.78);
  border: 5px solid rgba(255,255,255,0.92);

  box-shadow:
    0 28px 65px rgba(0,0,0,0.24),
    inset 0 0 18px rgba(255,255,255,0.55);

  animation: popIn 0.7s ease;
}

@keyframes popIn {
  from {
    opacity: 0;
    transform: scale(0.9) translateY(22px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

.book {
  font-size: 78px;
  animation: bounce 1.3s infinite ease-in-out;
  filter: drop-shadow(0 8px 10px rgba(0,0,0,0.25));
}

@keyframes bounce {
  0%,100% {
    transform: translateY(0) rotate(-3deg);
  }
  50% {
    transform: translateY(-12px) rotate(3deg);
  }
}

.badge {
  display: inline-block;
  margin-top: 16px;
  padding: 10px 26px;
  border-radius: 999px;

  color: white;
  font-size: 20px;
  font-weight: 800;

  background: linear-gradient(135deg, #1E88E5, #1565C0);
  box-shadow:
    0 8px 0 #0D47A1,
    0 14px 22px rgba(13,71,161,0.30);
}

h1 {
  margin: 24px 0 8px;

  font-size: 62px;
  line-height: 1.05;
  font-weight: 800;

  color: #FFE45E;

  text-shadow:
    -3px -3px 0 #1E3A8A,
     3px -3px 0 #1E3A8A,
    -3px  3px 0 #1E3A8A,
     3px  3px 0 #1E3A8A,
     0 8px 16px rgba(0,0,0,0.35);
}

.subtitle {
  margin-bottom: 30px;
  font-size: 22px;
  font-weight: 800;
  color: #1E3A8A;
  text-shadow: 0 2px 0 rgba(255,255,255,0.8);
}

.progress-box {
  width: 100%;
  height: 34px;

  border-radius: 999px;
  overflow: hidden;

  background: rgba(255,255,255,0.70);
  border: 4px solid rgba(255,255,255,0.95);

  box-shadow:
    inset 0 3px 8px rgba(0,0,0,0.18),
    0 5px 14px rgba(0,0,0,0.16);
}

.progress-bar {
  width: 0%;
  height: 100%;
  border-radius: 999px;

  background: linear-gradient(
    90deg,
    #FFE45E 0%,
    #FFD60A 32%,
    #4CC9F0 68%,
    #3A86FF 100%
  );

  box-shadow:
    0 0 12px rgba(255,228,94,0.9),
    0 0 22px rgba(58,134,255,0.55);

  transition: width 0.04s linear;
}

.percent {
  margin-top: 18px;
  font-size: 34px;
  font-weight: 800;
  color: #0D47A1;
  text-shadow:
    0 2px 0 #FFE45E,
    0 5px 10px rgba(0,0,0,0.18);
}

.loading-text {
  margin-top: 8px;
  font-size: 19px;
  font-weight: 800;
  color: #1565C0;
}

.footer {
  position: fixed;
  bottom: 22px;
  z-index: 2;
  width: 100%;
  text-align: center;
  font-size: 18px;
  font-weight: 800;
  color: rgba(255,255,255,0.95);
  text-shadow: 0 3px 8px rgba(0,0,0,0.45);
}
</style>
</head>

<body>

<div class="loading-card">
  <div class="book">📖</div>

  <div class="badge">เกมการเรียนรู้</div>

  <h1>เกมภาษาไทย</h1>

  <div class="subtitle">
    เตรียมเข้าสู่โลกแห่งการอ่านแสนสนุก
  </div>

  <div class="progress-box">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="percent" id="percent">0%</div>

  <div class="loading-text" id="loadingText">
    กำลังโหลดความสนุก...
  </div>
</div>

<div class="footer">สร้างโดย ครูเจมส์</div>

<script>
let percent = 0;

const percentText = document.getElementById("percent");
const progressBar = document.getElementById("progressBar");
const loadingText = document.getElementById("loadingText");

const loading = setInterval(() => {
  percent++;

  percentText.textContent = percent + "%";
  progressBar.style.width = percent + "%";

  if (percent >= 100) {
    clearInterval(loading);
    percentText.textContent = "พร้อมแล้ว!";
    loadingText.textContent = "กำลังเข้าสู่หน้าเกม...";
  }
}, 40);
</script>

</body>
</html>
